<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
      <!-- Chinese style paper lantern -->
      <rect x="36" y="24" width="28" height="48" rx="14" fill="#FF6B6B" stroke="#1A1A1A" stroke-width="4"/>
      <!-- Gold accents -->
      <rect x="36" y="20" width="28" height="6" fill="#FFDE4D" stroke="#1A1A1A" stroke-width="3"/>
      <rect x="36" y="70" width="28" height="6" fill="#FFDE4D" stroke="#1A1A1A" stroke-width="3"/>
      <!-- Tassel -->
      <line x1="50" y1="76" x2="50" y2="90" stroke="#FFDE4D" stroke-width="4" stroke-linecap="round"/>
      <!-- Inner detail lines -->
      <path d="M42,24 Q48,48 42,72" fill="none" stroke="#1A1A1A" stroke-width="2"/>
      <path d="M58,24 Q52,48 58,72" fill="none" stroke="#1A1A1A" stroke-width="2"/>
    </svg>