<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
      <!-- Branch -->
      <rect x="0" y="12" width="100" height="12" fill="#8B5E3C" stroke="#1A1A1A" stroke-width="4"/>
      <!-- Hive body (layered circles/capsules) -->
      <rect x="26" y="24" width="48" height="46" rx="23" fill="#FFDE4D" stroke="#1A1A1A" stroke-width="4"/>
      <rect x="32" y="32" width="36" height="30" rx="15" fill="#F4B400" />
      <!-- Swirly stripes -->
      <line x1="26" y1="44" x2="74" y2="44" stroke="#1A1A1A" stroke-width="4"/>
      <line x1="28" y1="56" x2="72" y2="56" stroke="#1A1A1A" stroke-width="4"/>
      <!-- Entrance hole -->
      <circle cx="50" cy="50" r="7" fill="#1A1A1A"/>
    </svg>