<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle card -->
  <rect x="2" y="2" width="96" height="96" rx="20" fill="#FFF" stroke="#1A1A1A" stroke-width="4" />
  
  <!-- Outer Head/Body -->
  <circle cx="50" cy="50" r="36" fill="#FB7185" stroke="#1A1A1A" stroke-width="4" />
  
  <!-- White highlight inside face -->
  <circle cx="50" cy="52" r="30" fill="#FFF" fill-opacity="0.15" />
  
  <!-- Eyes -->
  <circle cx="38" cy="45" r="5" fill="#1A1A1A" />
  <circle cx="62" cy="45" r="5" fill="#1A1A1A" />
  <!-- Eye highlights -->
  <circle cx="36" cy="43" r="1.5" fill="#FFF" />
  <circle cx="60" cy="43" r="1.5" fill="#FFF" />
  
  <!-- Nose/Snout -->
  <ellipse cx="50" cy="54" rx="6" ry="4" fill="#E2E8F0" stroke="#1A1A1A" stroke-width="3" />
  <circle cx="50" cy="53" r="2.5" fill="#1A1A1A" />
  
  <!-- Smile -->
  <path d="M 46 62 Q 50 67 54 62" fill="none" stroke="#1A1A1A" stroke-width="3" stroke-linecap="round" />
  
  <!-- Cheeks -->
  <circle cx="28" cy="52" r="3.5" fill="#FF8BCD" fill-opacity="0.7" />
  <circle cx="72" cy="52" r="3.5" fill="#FF8BCD" fill-opacity="0.7" />
</svg>