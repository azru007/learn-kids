<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
      <!-- Ears -->
      <circle cx="28" cy="30" r="11" fill="#1A1A1A" stroke="#1A1A1A" stroke-width="2"/>
      <circle cx="72" cy="30" r="11" fill="#1A1A1A" stroke="#1A1A1A" stroke-width="2"/>
      <!-- Head -->
      <circle cx="50" cy="52" r="30" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="4"/>
      <!-- Eye Patches -->
      <ellipse cx="40" cy="50" rx="8" ry="10" fill="#1A1A1A" transform="rotate(-15 40 50)"/>
      <ellipse cx="60" cy="50" rx="8" ry="10" fill="#1A1A1A" transform="rotate(15 60 50)"/>
      <!-- Eyes -->
      <circle cx="40" cy="48" r="2.5" fill="#FFFFFF"/>
      <circle cx="60" cy="48" r="2.5" fill="#FFFFFF"/>
      <circle cx="40" cy="48" r="1" fill="#1A1A1A"/>
      <circle cx="60" cy="48" r="1" fill="#1A1A1A"/>
      <!-- Nose -->
      <ellipse cx="50" cy="58" rx="4" ry="2.5" fill="#1A1A1A"/>
      <!-- Mouth -->
      <path d="M46,63 Q50,67 54,63" stroke="#1A1A1A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </svg>