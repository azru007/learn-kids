name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Typecheck
      run: npx tsc --noEmit

    - name: Lint
      run: npm run lint

    - name: Unit Tests
      run: npm run test

    - name: Build Application
      run: npm run build

    - name: Install Playwright Browsers
      run: npx playwright install chromium --with-deps

    - name: E2E Smoke Tests
      run: npm run test:e2e
